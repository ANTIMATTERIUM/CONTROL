name: cold-replay

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "17 3 * * 1"

permissions:
  contents: read

jobs:
  cold-replay:
    name: public-cold-replay-control-plane
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm run verify
      - run: npm run replay
