name: ANTIMATTERIUM Stranger Final Audit

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '17 3 * * *'
permissions:
  contents: read

jobs:
  stranger-final-audit:
    name: Stranger final audit
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout CONTROL
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Verify CONTROL chain
        run: npm run verify

      - name: Run stranger final audit
        run: npm run audit:final

      - name: Run public stranger CI backpropagation audit
        run: npm run audit:backpropagation

      - name: Run public ecosystem index echo audit
        run: npm run audit:ecosystem-echo

      - name: Run public rootless reconstruction audit
        run: npm run audit:rootless-reconstruction

      - name: Run rootless fanout echo audit
        run: npm run audit:rootless-fanout-echo

      - name: Run rootless fanout backlink closure audit
        run: npm run audit:rootless-fanout-backlink-closure
      - name: Run rootless fanout backpropagation echo audit
        run: npm run audit:rootless-fanout-backpropagation-echo
      - name: Run rootless fanout backpropagation echo fanout closure audit
        run: npm run audit:rootless-fanout-backpropagation-echo-fanout-closure
      - name: Run rootless fanout backpropagation echo fanout backlink closure audit
        run: npm run audit:rootless-fanout-backpropagation-echo-fanout-backlink-closure
      - name: Run rootless fanout backpropagation echo fanout backlink closure backpropagation closure audit
        run: npm run audit:rootless-fanout-backpropagation-echo-fanout-backlink-closure-backpropagation-closure
      - name: Run rootless fanout backlink closure backpropagation closure fanout closure audit
        run: npm run audit:rootless-fanout-backlink-closure-backpropagation-closure-fanout-closure
      - name: Run rootless fanout backlink closure backpropagation closure fanout backlink closure audit
        run: npm run audit:rootless-fanout-backlink-closure-backpropagation-closure-fanout-backlink-closure
      - name: Run rootless fanout backlink closure backpropagation closure fanout backlink closure fanout closure audit
        run: npm run audit:rootless-fanout-backlink-closure-backpropagation-closure-fanout-backlink-closure-fanout-closure

      - name: Run rootless fanout closure backlink closure audit
        run: npm run audit:rootless-fanout-backlink-closure-backpropagation-closure-fanout-backlink-closure-fanout-closure-backlink-closure
      - name: Run public surface backlink fanout closure audit
        run: npm run audit:rootless-fanout-backlink-closure-backpropagation-closure-fanout-backlink-closure-fanout-closure-backlink-closure-fanout-closure
      - name: Run Move 28 public surface backlink fanout closure audit
        run: npm run audit:rootless-fanout-backlink-closure-backpropagation-closure-fanout-backlink-closure-fanout-closure-backlink-closure-fanout-closure-backlink-closure
      - name: Emit public audit markers
        run: |
          echo "ANTIMATTERIUM_PUBLIC_STRANGER_CI_PASS=true"
          echo "ANTIMATTERIUM_STRANGER_FINAL_AUDIT_PASS=true"
          echo "ANTIMATTERIUM_BIDIRECTIONAL_PUBLIC_CHAIN_CLOSED=true"
          echo "ANTIMATTERIUM_SECOND_ORDER_PUBLIC_STRANGER_CI_LOOP_CLOSED=true"
          echo "ANTIMATTERIUM_PUBLIC_ECOSYSTEM_ECHO_GRAPH_CLOSED=true"
          echo "ANTIMATTERIUM_ROOTLESS_FANOUT_BACKPROPAGATION_ECHO_FANOUT_BACKLINK_CLOSURE_BACKPROPAGATION_CLOSED=true"
          echo "ANTIMATTERIUM_NO_LOCAL_ROOT_REQUIRED=true"
          echo "ANTIMATTERIUM_MOVE28_PUBLIC_SURFACE_BACKLINK_FANOUT_CLOSED=true"
          echo "ANTIMATTERIUM_PUBLIC_SURFACE_BACKLINK_FANOUT_CLOSED=true"
          echo "ANTIMATTERIUM_ROOTLESS_FANOUT_BACKLINK_CLOSURE_BACKPROPAGATION_CLOSURE_FANOUT_BACKLINK_CLOSURE_FANOUT_CLOSURE_BACKLINK_CLOSED=true"
          echo "ANTIMATTERIUM_ROOTLESS_FANOUT_ECHO_GRAPH_CLOSED=true"
          echo "NO_CURRENT_PRODUCTION_CLAIM=true"
          echo "NO_STARSHIP_CLAIM=true"
          echo "NO_PHYSICAL_PRODUCTION_INSTRUCTIONS=true"
